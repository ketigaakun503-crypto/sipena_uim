[build]
builder = "railpack"

[build.environment]
PHP_VERSION = "8.2"
NODE_VERSION = "18"
COMPOSER_MEMORY_LIMIT = "-1"
COMPOSER_ALLOW_SUPERUSER = "1"

[build.commands]
install = "composer install --optimize-autoloader --no-scripts --no-interaction --ignore-platform-req=ext-gd"

[deploy]
startCommand = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"